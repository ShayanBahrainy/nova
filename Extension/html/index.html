<!DOCTYPE html>
<html>
    <head>
        <script src="../js/index.js"></script>
        <style>
            #login-button {
                position: absolute;
                left: 50%;
                top: 50%;
                transform: translate(-50%, -50%);
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 20px;
            }

            #veracross-logo {
                display: inline;
            }

            .invisible {
                display: none;
                visibility: collapse;
            }

            #login-button:hover {
                box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
            }

        </style>
    </head>
    <body style="width: 400px; height: 400px;">
        <div id="login-button" class="invisible">
            <img src="../assets/veracross.svg" width="64" height="64" id="veracross-logo">
            <p>Login with Veracross</p>
        </div>
    </body>
</html>
