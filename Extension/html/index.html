<!DOCTYPE html>
<html>
    <head>
        <script src="../js/index.js"></script>
        <style>
            #login-button {
                position: absolute;
                left: 50%;
                top: 50%;
                transform: translate(-50%, -50%);
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 20px;
            }

            .code-label {
                white-space: nowrap;
            }

            #verify-code {
                position: absolute;
                left: 50%;
                top: 50%;
                transform: translate(-50%, -50%);

                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 20px;
            }

            #verify-code-field {
                display: flex;
                flex-direction: row;
                align-items: center;
                gap: 10px;
            }

            .digit {
                width: 1em;
                border-top: none;
                border-left: none;
                border-right: none;
            }

            .digit:focus {
                outline: none;
            }

            #veracross-logo {
                display: inline;
            }

            .invisible {
                display: none;
                visibility: collapse;
            }

            #login-button:hover {
                box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
            }

        </style>
    </head>
    <body style="width: 400px; height: 400px;">
        <div id="login-button" class="invisible">
            <img src="../assets/veracross.svg" width="64" height="64" id="veracross-logo">
            <p>Login with Veracross</p>
        </div>
        <div id="verify-code" class="">
            <p class="code-label">Please enter the code sent to {email}</p>
            <div id="verify-code-field">
                <input class="digit" id="digit-1" type="text" inputmode="numeric" pattern="[0-9]" maxlength="1">
                <input class="digit" id="digit-2" type="text" inputmode="numeric" pattern="[0-9]" maxlength="1">
                <input class="digit" id="digit-3" type="text" inputmode="numeric" pattern="[0-9]" maxlength="1">
                <input class="digit" id="digit-4" type="text" inputmode="numeric" pattern="[0-9]" maxlength="1">
                <input class="digit" id="digit-5" type="text" inputmode="numeric" pattern="[0-9]" maxlength="1">
                <input class="digit" id="digit-6" type="text" inputmode="numeric" pattern="[0-9]" maxlength="1">
            </div>
        </div>
    </body>
</html>
